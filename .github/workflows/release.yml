name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu dpkg-dev

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Read version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*\"\(.*\)\".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          ARCH=${{ matrix.deb_arch }}
          TARGET=${{ matrix.target }}
          PKG="btx_${VERSION}_${ARCH}"

          mkdir -p "$PKG/usr/local/bin" "$PKG/lib/systemd/user" "$PKG/DEBIAN"

          cp "target/$TARGET/release/btx"         "$PKG/usr/local/bin/btx"
          cp "target/$TARGET/release/btx-connect" "$PKG/usr/local/bin/btx-connect"

          printf '[Unit]\nDescription=btx connect trusted Bluetooth devices at startup\nAfter=bluetooth.target graphical-session.target\nWants=bluetooth.target\n\n[Service]\nType=oneshot\nExecStart=/usr/local/bin/btx-connect\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=graphical-session.target\n' \
            > "$PKG/lib/systemd/user/btx-connect.service"

          printf 'Package: btx\nVersion: %s\nArchitecture: %s\nMaintainer: SubNader <subnader@gmail.com>\nDescription: Terminal UI for managing Bluetooth devices on Linux\nDepends: dbus\n' \
            "$VERSION" "$ARCH" > "$PKG/DEBIAN/control"

          printf '#!/bin/sh\nset -e\nif [ "$1" = "configure" ]; then\n  systemctl --global enable btx-connect.service || true\nfi\n' \
            > "$PKG/DEBIAN/postinst"
          chmod 755 "$PKG/DEBIAN/postinst"

          printf '#!/bin/sh\nset -e\nif [ "$1" = "remove" ] || [ "$1" = "purge" ]; then\n  systemctl --global disable btx-connect.service || true\nfi\n' \
            > "$PKG/DEBIAN/prerm"
          chmod 755 "$PKG/DEBIAN/prerm"

          dpkg-deb --build "$PKG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.deb_arch }}
          path: |
            target/${{ matrix.target }}/release/btx
            target/${{ matrix.target }}/release/btx-connect
            btx_*_${{ matrix.deb_arch }}.deb

  release:
    name: Publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*\"\(.*\)\".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p release
          cp dist/dist-amd64/target/x86_64-unknown-linux-gnu/release/btx         release/btx-x86_64
          cp dist/dist-amd64/target/x86_64-unknown-linux-gnu/release/btx-connect  release/btx-connect-x86_64
          cp dist/dist-arm64/target/aarch64-unknown-linux-gnu/release/btx         release/btx-aarch64
          cp dist/dist-arm64/target/aarch64-unknown-linux-gnu/release/btx-connect  release/btx-connect-aarch64
          cp "dist/dist-amd64/btx_${VERSION}_amd64.deb" release/
          cp "dist/dist-arm64/btx_${VERSION}_arm64.deb" release/

      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release delete "v${VERSION}" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest
