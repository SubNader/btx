name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=${{ matrix.deb_arch }}
          PKG="btx_${VERSION}_${ARCH}"
          TARGET=${{ matrix.target }}

          mkdir -p "$PKG/usr/local/bin"
          mkdir -p "$PKG/lib/systemd/user"
          mkdir -p "$PKG/DEBIAN"

          cp "target/$TARGET/release/btx"         "$PKG/usr/local/bin/btx"
          cp "target/$TARGET/release/btx-connect" "$PKG/usr/local/bin/btx-connect"

          cat > "$PKG/lib/systemd/user/btx-connect.service" <<EOF
[Unit]
Description=btx connect trusted Bluetooth devices at startup
After=bluetooth.target graphical-session.target
Wants=bluetooth.target

[Service]
Type=oneshot
ExecStart=/usr/local/bin/btx-connect
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=graphical-session.target
EOF

          cat > "$PKG/DEBIAN/control" <<EOF
Package: btx
Version: $VERSION
Architecture: $ARCH
Maintainer: SubNader
Description: Terminal UI for managing Bluetooth devices on Linux
Depends: dbus
EOF

          cat > "$PKG/DEBIAN/postinst" <<'EOF'
#!/bin/sh
set -e
if [ "$1" = "configure" ]; then
  systemctl --global enable btx-connect.service || true
fi
EOF
          chmod 755 "$PKG/DEBIAN/postinst"

          cat > "$PKG/DEBIAN/prerm" <<'EOF'
#!/bin/sh
set -e
if [ "$1" = "remove" ] || [ "$1" = "purge" ]; then
  systemctl --global disable btx-connect.service || true
fi
EOF
          chmod 755 "$PKG/DEBIAN/prerm"

          dpkg-deb --build "$PKG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.deb_arch }}
          path: |
            target/${{ matrix.target }}/release/btx
            target/${{ matrix.target }}/release/btx-connect
            btx_*_${{ matrix.deb_arch }}.deb

  release:
    name: Publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage release files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir release

          cp dist/dist-amd64/target/x86_64-unknown-linux-gnu/release/btx          release/btx-x86_64
          cp dist/dist-amd64/target/x86_64-unknown-linux-gnu/release/btx-connect   release/btx-connect-x86_64
          cp dist/dist-arm64/target/aarch64-unknown-linux-gnu/release/btx          release/btx-aarch64
          cp dist/dist-arm64/target/aarch64-unknown-linux-gnu/release/btx-connect   release/btx-connect-aarch64
          cp "dist/dist-amd64/btx_${VERSION}_amd64.deb" release/
          cp "dist/dist-arm64/btx_${VERSION}_arm64.deb" release/

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: release/*
          generate_release_notes: true
          make_latest: true
